<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Monitor Umidità</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <h2>Umidità in tempo reale</h2>

    <canvas id="humidityChart"></canvas>

    <script>
        const ctx = document.getElementById('humidityChart').getContext('2d');

        let labels = [];
        let data = [];

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                label: 'Umidità',
                data: data,
                borderColor: 'blue',
                backgroundColor: 'rgba(0, 0, 255, 0.2)',
                tension: 0.3
                }]
            },
            options: {
                scales: {
                y: {
                    min: 0,
                    max: 100
                }
                }
            }
        });

        async function getHumidity() {
            return Math.floor(Math.random() * (50 - 15 + 1)) + 15;
        }

        // aggiorna grafico ogni 2 secondi
        setInterval(async () => {
            const now = new Date().toLocaleTimeString();
            const humidity = await getHumidity();

            labels.push(now);
            data.push(humidity);

            if (labels.length > 10) {
                labels.shift();
                data.shift();
            }

            chart.update();
            }, 2000);
    </script>

</body>
</html>
